# On-call schedule — consumed by src/journey.ts (isOnCall + classify).
# A call is considered on-call when its startedAt (converted to `timezone`)
# falls inside any of the listed windows.
#
# STATUS: DEFAULTS for Grupo Wellness. Adjust per real coverage.

timezone: America/Argentina/Buenos_Aires

windows:
  - name: weekday_night
    days: [Mon, Tue, Wed, Thu, Fri]
    start: "21:00"
    end:   "09:00+1"   # crosses midnight into next day

  - name: saturday
    days: [Sat]
    start: "00:00"
    end:   "24:00"

  - name: sunday
    days: [Sun]
    start: "00:00"
    end:   "24:00"
